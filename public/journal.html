<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Journal App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      transition: background-color 0.3s, color 0.3s;
      background-color: #fff;
      color: #222;
    }
    textarea { width: 100%; }
    .entry { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
    .entry-date { font-weight: bold; margin-bottom: 5px; }
    button { margin-right: 10px; }
    #edit-section { margin-top: 20px; border-top: 2px solid #ccc; padding-top: 20px; }

    body.dark-mode { background-color: #121212; color: #eee; }
    body.dark-mode .entry { border-color: #444; }
    body.dark-mode textarea { background-color: #222; color: #eee; border: 1px solid #444; }
    body.dark-mode input[type="date"] { background-color: #222; color: #eee; border: 1px solid #444; }
    body.dark-mode button { background-color: #333; color: #eee; border: none; }

    #dark-mode-toggle {
      position: fixed;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: #555;
      transition: color 0.3s;
      z-index: 1000;
    }
    #dark-mode-toggle:hover { color: #000; }
    body.dark-mode #dark-mode-toggle { color: #eee; }

    .error { color: red; margin-bottom: 10px; }
  </style>
</head>
<body>
  <button id="dark-mode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>

  <h1>My Journal</h1>
  <p>Welcome, {{ username }} | <a href="/auth/logout">Logout</a></p>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <!-- All entries -->
  <div id="entries">
    {% if entries %}
      {% for entry in entries %}
        <div class="entry">
          <div class="entry-date">{{ entry.entry_date }}</div>
          <div>{{ entry.content }}</div>
          <!-- Edit button fills the edit form below -->
          <button type="button"
            onclick="fillEditForm('{{ entry.entry_date }}', this.closest('.entry').querySelector('div:nth-child(2)').innerText)">
            Edit
          </button>
          <!-- Delete form -->
          <form method="POST" action="/journal" style="display:inline;">
            <input type="hidden" name="action" value="delete" />
            <input type="hidden" name="entry_date" value="{{ entry.entry_date }}" />
            <input type="hidden" name="content" value="" />
            <button type="submit" onclick="return confirm('Delete this entry?')">Delete</button>
          </form>
        </div>
      {% endfor %}
    {% else %}
      <p>No journal entries yet.</p>
    {% endif %}
  </div>

  <!-- Add new entry -->
  <h2>Add New Entry</h2>
  <form method="POST" action="/journal">
    <input type="hidden" name="action" value="create" />
    <input type="date" name="entry_date" required />
    <br /><br />
    <textarea name="content" id="new-entry-content" rows="5" placeholder=""></textarea>
    <br />
    <button type="submit">Save Entry</button>
  </form>

  <!-- Edit entry -->
  <div id="edit-section" style="display:none;">
    <h2>Edit Entry</h2>
    <form method="POST" action="/journal">
      <input type="hidden" name="action" value="update" />
      <input type="date" id="edit-entry-date" name="entry_date" disabled />
      <input type="hidden" id="edit-entry-date-hidden" name="entry_date" />
      <br /><br />
      <textarea id="edit-entry-content" name="content" rows="5"></textarea>
      <br />
      <button type="submit">Update Entry</button>
      <button type="button" onclick="document.getElementById('edit-section').style.display='none'">Cancel</button>
    </form>
  </div>

  <script>
    // Dark mode
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    if (localStorage.getItem('darkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
      darkModeToggle.textContent = '☀️';
    }
    darkModeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      darkModeToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    });

    // Typing placeholder effect
    const textarea = document.getElementById('new-entry-content');
    const text = "What's on your mind lately?";
    let index = 0;
    function typePlaceholder() {
      if (index <= text.length) {
        textarea.setAttribute('placeholder', text.slice(0, index));
        index++;
        setTimeout(typePlaceholder, 100);
      } else {
        setTimeout(() => { index = 0; textarea.setAttribute('placeholder', ''); setTimeout(typePlaceholder, 500); }, 1500);
      }
    }
    typePlaceholder();

    // Fill edit form
    function fillEditForm(date, content) {
      document.getElementById('edit-entry-date').value = date;
      document.getElementById('edit-entry-date-hidden').value = date;
      document.getElementById('edit-entry-content').value = content.trim();
      document.getElementById('edit-section').style.display = 'block';
      window.scrollTo(0, document.body.scrollHeight);
    }
  </script>
</body>
</html>
